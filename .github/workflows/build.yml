name: Build and Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install pyinstaller

      - run: pip install -r requirements.txt

      - run: >
          pyinstaller --onefile --noconsole
          --add-data "icon32.png;."
          --add-data "jump.wav;."
          --add-data "lifedown.wav;."
          --add-data "lifeup.wav;."
          --add-data "point.wav;."
          --add-data "rainbow.wav;."
          --add-data "golden.wav;."
          --add-data "ice.wav;."
          --add-data "DejaVuSansMono.ttf;."
          --icon "icon32.png"
          --name antipattern-bird app.py

      - uses: actions/upload-artifact@v4
        with:
          name: antipattern-bird-win-x64
          path: dist/antipattern-bird.exe

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/antipattern-bird.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install pyinstaller pillow

      - run: pip install -r requirements.txt

      - run: >
          pyinstaller --onefile
          --add-data "icon32.png:."
          --add-data "jump.wav:."
          --add-data "lifedown.wav:."
          --add-data "lifeup.wav:."
          --add-data "point.wav:."
          --add-data "rainbow.wav:."
          --add-data "golden.wav:."
          --add-data "ice.wav:."
          --add-data "DejaVuSansMono.ttf:."
          --name antipattern-bird app.py

      - uses: actions/upload-artifact@v4
        with:
          name: antipattern-bird-linux-x64
          path: dist/antipattern-bird

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/antipattern-bird
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk wget \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Build Android APK
        run: |
          yes | buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Find and rename APK
        run: |
          mkdir -p output
          APK_PATH=$(find . -name "*.apk" | head -1)
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" output/antipattern-bird.apk
          else
            echo "APK not found!"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: antipattern-bird-android
          path: output/antipattern-bird.apk

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: output/antipattern-bird.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}