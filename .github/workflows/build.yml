name: Build and Release
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install pyinstaller pillow

      - run: pip install -r requirements.txt

      - run: >
          pyinstaller --onefile --noconsole
          --add-data "icon32.png;."
          --add-data "jump.wav;."
          --add-data "lifedown.wav;."
          --add-data "lifeup.wav;."
          --add-data "point.wav;."
          --add-data "rainbow.wav;."
          --add-data "golden.wav;."
          --add-data "ice.wav;."
          --add-data "DejaVuSansMono.ttf;."
          --icon "icon32.png"
          --name antipattern-bird app.py

      - uses: actions/upload-artifact@v4
        with:
          name: antipattern-bird-win-x64
          path: dist/antipattern-bird.exe

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/antipattern-bird.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install pyinstaller pillow

      - run: pip install -r requirements.txt

      - run: >
          pyinstaller --onefile
          --add-data "icon32.png:."
          --add-data "jump.wav:."
          --add-data "lifedown.wav:."
          --add-data "lifeup.wav:."
          --add-data "point.wav:."
          --add-data "rainbow.wav:."
          --add-data "golden.wav:."
          --add-data "ice.wav:."
          --add-data "DejaVuSansMono.ttf:."
          --name antipattern-bird app.py

      - uses: actions/upload-artifact@v4
        with:
          name: antipattern-bird-linux-x64
          path: dist/antipattern-bird

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/antipattern-bird
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Use system Python (bypass venv)
        working-directory: ${{ github.workspace }}
        run: |
          echo "PYTHON=/usr/bin/python3" >> $GITHUB_ENV
          echo "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" >> $GITHUB_EN     

      - name: Build APK with Buildozer
        working-directory: ${{ github.workspace }}
        env:
          PYTHON: /usr/bin/python3
          BUILDOZER_WARN_ON_ROOT: 0
        run: yes | buildozer android debug          

      - name: Find and prepare APK
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p output
          find . -name "*.apk" -exec cp {} output/antipattern-bird.apk \;

      - uses: actions/upload-artifact@v4
        with:
          name: antipattern-bird-android
          path: ${{ github.workspace }}/output/antipattern-bird.apk

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ github.workspace }}/output/antipattern-bird.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
